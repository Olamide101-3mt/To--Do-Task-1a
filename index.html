<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Todo Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <article class="todo-card" data-testid="test-todo-card">
            
            <div id="view-mode">
                <header class="card-header">
                    <div class="priority-indicator" data-testid="test-todo-priority-indicator"></div>
                    <div class="title-group">
                        <h2 class="todo-title" data-testid="test-todo-title">Complete Task</h2>
                        <span class="priority-badge" data-testid="test-todo-priority">High</span>
                    </div>
                    <div class="status-display" data-testid="test-todo-status">Pending</div>
                </header>

                <div class="card-body">
                    <div id="description-container" class="collapsed" data-testid="test-todo-collapsible-section">
                        <p class="description" data-testid="test-todo-description">
                            This is a very long description intended to test the expand and collapse functionality of the Stage 1a task. It should hide overflow until the toggle is clicked.
                        </p>
                    </div>
                    <button id="expand-btn" data-testid="test-todo-expand-toggle" aria-expanded="false" aria-controls="description-container">
                        Show More
                    </button>

                    <div class="tags-container" data-testid="test-todo-tags">
                        <span class="tag" data-testid="test-todo-tag-work">Work</span>
                    </div>
                </div>

                <footer class="card-footer">
                    <div class="date-info">
                        <time class="due-date" data-testid="test-todo-due-date">Due Apr 16, 2026</time>
                        <div class="time-wrapper">
                            <time class="time-remaining" data-testid="test-todo-time-remaining">Calculating...</time>
                            <span id="overdue-badge" class="hidden" data-testid="test-todo-overdue-indicator">OVERDUE</span>
                        </div>
                    </div>

                    <div class="controls-row">
                        <div class="status-sync-group">
                            <input type="checkbox" id="complete-toggle" data-testid="test-todo-complete-toggle">
                            <select id="status-control" data-testid="test-todo-status-control" aria-label="Change Status">
                                <option value="Pending">Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Done">Done</option>
                            </select>
                        </div>
                        
                        <div class="button-group">
                            <button id="edit-btn" class="icon-btn" data-testid="test-todo-edit-button" aria-label="Edit">✏️</button>
                            <button id="delete-btn" class="icon-btn" data-testid="test-todo-delete-button" aria-label="Delete">🗑️</button>
                        </div>
                    </div>
                </footer>
            </div>

            <form id="edit-form" class="hidden" data-testid="test-todo-edit-form">
                <h3>Edit Task</h3>
                <label for="edit-title">Title</label>
                <input type="text" id="edit-title" data-testid="test-todo-edit-title-input" required>

                <label for="edit-desc">Description</label>
                <textarea id="edit-desc" data-testid="test-todo-edit-description-input" rows="3"></textarea>

                <div class="form-row">
                    <div>
                        <label for="edit-priority">Priority</label>
                        <select id="edit-priority" data-testid="test-todo-edit-priority-select">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div>
                        <label for="edit-due">Due Date</label>
                        <input type="datetime-local" id="edit-due" data-testid="test-todo-edit-due-date-input">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="cancel-btn" data-testid="test-todo-cancel-button">Cancel</button>
                    <button type="submit" id="save-btn" data-testid="test-todo-save-button">Save Changes</button>
                </div>
            </form>

        </article>
    </main>

    <script src="script.js"></script>
</body>
</html>
